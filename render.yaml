services:
  - type: web
    name: chatflow
    runtime: python
    buildCommand: "npm install && npm run build && pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chatflow-db
          property: connectionString
      - key: NODE_VERSION
        value: 20.0.0
      - key: PYTHON_VERSION
        value: 3.10.0

databases:
  - name: chatflow-db
    plan: free
